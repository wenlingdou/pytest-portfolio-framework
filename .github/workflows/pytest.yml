name: pytest

on:
  push:
    branches: ["main"]

permissions:
  contents: write
  checks: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create .env
        run: |
          echo "BASE_URL=https://httpbin.org" > .env
          echo "TIMEOUT=10" >> .env

      - name: Run pytest
        run: |
          rm -rf reports
          mkdir -p reports
          pytest -m api -v

      - name: Copy report to docs
        run: |
          mkdir -p docs
          cp reports/report.html docs/report.html

      - name: Commit report to GitHub Pages
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add docs/report.html
          git commit -m "Update test report [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin HEAD:main

          