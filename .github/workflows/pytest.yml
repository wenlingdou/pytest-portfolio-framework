name: pytest

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  tests:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env for CI
        run: |
          echo BASE_URL=https://httpbin.org > .env
          echo TIMEOUT=10 >> .env

      - name: Run pytest (API) with JUnit output
        run: |
          pytest -m api -v --junitxml=reports/junit.xml

      - name: Publish test results summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: PyTest Results
          path: reports/junit.xml
          reporter: java-junit

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: reports/report.html

          